<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Travel Hub Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Welcome to Travel Hub</h2>
      <p>Enter your details to confirm participation</p>
    </div>
    <form action="index.php" method="POST">
      <div class="form-container">
        <!-- Name -->
        <div class="form-group">
          <label>Name:</label>
          <input type="text" name="Name" placeholder="Your name" required />
        </div>

        
        <div class="form-group">
          <label>Age:</label>
          <input type="number" name="Age" placeholder="Your age" required />
        </div>

        
        <div class="form-group">
          <label>Email:</label>
          <input type="email" name="Email" placeholder="Your email" required />
        </div>

        <div class="form-group">
          <label>Phone:</label>
          <input type="tel" name="Phone" placeholder="Your phone number" />
        </div>

        <div class="form-group">
          <label>Destination:</label>
          <input type="text" name="Dest" placeholder="Your destination" />
        </div>

        <div class="form-group">
          <label>Additional Info:</label>
          <textarea name="Info" placeholder="Enter more info..."></textarea>
        </div>

        <div class="form-group">
          <label>Gender:</label><br />
          <input type="radio" name="Gender" value="male" /> Male
          <input type="radio" name="Gender" value="female" /> Female
          <input type="radio" name="Gender" value="other" /> Prefer not to say
        </div>

        <div class="form-group">
          <button type="submit" class="btn">Submit</button>
          <button type="reset" class="btnReset">Reset</button>
        </div>
      </div>
    </form>
  </body>
</html>
